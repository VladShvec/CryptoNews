services:
  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api

  api:
    build:
      context: ../../
      dockerfile: services/api/docker/dev/Dockerfile
    container_name: api
    working_dir: /app/services/api
    volumes:
      - ../../:/app
    expose:
      - "8080"

  scanner:
    build:
      context: ../../
      dockerfile: services/scanner/docker/dev/Dockerfile
    container_name: scanner
    working_dir: /app/services/scanner
    volumes:
      - ../../:/app
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  parser:
    build:
      context: ../../
      dockerfile: services/parser/docker/dev/Dockerfile
    container_name: parser
    working_dir: /app/services/parser
    volumes:
      - ../../:/app
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_GROUP_ID: parser-group
    depends_on:
      kafka:
        condition: service_healthy

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 10