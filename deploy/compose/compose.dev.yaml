services:
  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api

  api:
    build:
      context: ../../
      dockerfile: services/api/docker/dev/Dockerfile
    container_name: api
    working_dir: /app/services/api
    volumes:
      - ../../:/app
    expose:
      - "8080"